name: Auto Release

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      force:
        type: boolean
        required: false
        default: false
        description: "Release even if there are no new commits since the last tag"

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Check for unreleased commits
        id: check
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*.*.*' 2>/dev/null || echo '')
          if [ -z "$LATEST_TAG" ]; then
            echo "No previous release tag found, treating as unreleased changes"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            COUNT=$(git rev-list "$LATEST_TAG"..HEAD --count)
            if [ "$COUNT" -gt 0 ] || [ "${{ github.event.inputs.force }}" = "true" ]; then
              echo "$COUNT unreleased commits since $LATEST_TAG"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "No changes to release since $LATEST_TAG, skipping"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26"

      - name: Bump patch version
        id: bump
        if: steps.check.outputs.has_changes == 'true'
        run: |
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to $NEW_VERSION"

      - name: Commit and push tag
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.bump.outputs.new_version }}"
          git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}"
          git push origin main
          git push origin "v${{ steps.bump.outputs.new_version }}"
